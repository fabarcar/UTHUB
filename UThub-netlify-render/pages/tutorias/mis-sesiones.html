<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mis Sesiones - UThub</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../css/styles.css">
  <link rel="stylesheet" href="../../css/dashboard.css">
  <link rel="stylesheet" href="../../css/comida.css">
  <style>
    .sesion-card{background:white;border-radius:18px;padding:24px;box-shadow:0 2px 12px rgba(0,0,0,.06);margin-bottom:18px;border-left:4px solid transparent;}
    .sesion-card.estado-pendiente{border-left-color:#F5841F;}
    .sesion-card.estado-aceptada{border-left-color:#22C55E;}
    .sesion-card.estado-rechazada,.sesion-card.estado-cancelada{border-left-color:#E5E7EB;}
    .sesion-card.estado-completada{border-left-color:#60A5FA;}
    .sesion-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;gap:12px;}
    .sesion-tutor{display:flex;align-items:center;gap:12px;}
    .sesion-avatar{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:Syne,sans-serif;font-size:14px;font-weight:800;color:white;flex-shrink:0;}
    .sesion-nombre{font-family:Syne,sans-serif;font-size:15px;font-weight:800;color:#1A1A2E;}
    .sesion-materia{font-size:13px;color:#6B6B80;margin-top:2px;}
    .sesion-info{display:flex;flex-wrap:wrap;gap:16px;margin-bottom:16px;}
    .sesion-dato{font-size:13px;color:#6B6B80;}
    .sesion-dato strong{color:#1A1A2E;font-weight:600;}
    /* THE KEY FEATURE: WhatsApp button */
    .btn-whatsapp{display:inline-flex;align-items:center;gap:8px;padding:11px 20px;background:#25D366;color:white;border:none;border-radius:10px;font-family:Syne,sans-serif;font-size:14px;font-weight:700;cursor:pointer;text-decoration:none;transition:all .2s;}
    .btn-whatsapp:hover{background:#20BA5A;transform:translateY(-1px);}
    .btn-whatsapp svg{flex-shrink:0;}
    .whatsapp-notice{font-size:11px;color:#16A34A;margin-top:6px;}
    .btn-cancelar{background:none;border:1.5px solid #E5E7EB;color:#9CA3AF;padding:9px 16px;border-radius:10px;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;}
    .btn-cancelar:hover{border-color:#FF4F5E;color:#FF4F5E;}
    .tabs{display:flex;gap:4px;background:#F7F4F0;border-radius:12px;padding:4px;margin-bottom:24px;width:fit-content;}
    .tab{padding:8px 18px;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;color:#6B6B80;transition:all .2s;border:none;background:none;}
    .tab.active{background:white;color:#1A1A2E;box-shadow:0 2px 8px rgba(0,0,0,.08);}
    .empty-sesiones{text-align:center;padding:60px;background:white;border-radius:18px;border:2px dashed #E8E4DE;}
  </style>
</head>
<body class="dashboard-page">
  <header class="header" id="header">
    <div class="header-container">
      <a href="../../index.html" class="logo"><span class="logo-ut">UT</span><span class="logo-hub">hub</span></a>
      <nav class="nav"><ul class="nav-list">
          <li><a href="../auth/dashboard.html" class="nav-link">Dashboard</a></li>
          <li><a href="../comida/tiendas.html" class="nav-link">🍔 Comida</a></li>
          <li><a href="buscar.html" class="nav-link active">📚 Tutorías</a></li>
          <li><a href="../libros/catalogo.html" class="nav-link">📖 Libros</a></li>
      </ul></nav>
      <div class="header-actions">
        <button class="icon-btn" id="notifications-btn">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          <span class="badge-notif">0</span>
        </button>
        <div class="user-menu"><button class="user-btn" id="user-menu-btn">
          <div class="user-avatar"><span id="user-initials">SM</span></div>
          <div class="user-info"><div class="user-name">Samantha Mata</div><div class="user-role">Estudiante</div></div>
        </button></div>
      </div>
    </div>
  </header>
  <nav aria-label="breadcrumb" class="breadcrumb-nav">
    <div class="container">
      <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="buscar.html">Tutorías</a></li>
        <li class="breadcrumb-item active" aria-current="page">Mis Sesiones</li>
      </ol>
    </div>
  </nav>
  <main class="main-content">
    <div class="container">
      <div class="page-header">
        <div>
          <h1 class="page-title">📅 Mis Sesiones</h1>
          <p class="page-subtitle">Historial y próximas sesiones de tutoría</p>
        </div>
        <a href="buscar.html" class="btn-tienda" style="width:auto;padding:10px 20px;font-size:13px;">+ Reservar nueva sesión</a>
      </div>

      <div class="tabs">
        <button class="tab active" onclick="setTab('proximas',this)">Próximas</button>
        <button class="tab" onclick="setTab('pendientes',this)">Pendientes</button>
        <button class="tab" onclick="setTab('pasadas',this)">Historial</button>
      </div>

      <div id="sesiones-container"></div>
    </div>
  </main>
  <script src="/js/config.js"></script>
  <script src="../../js/tutorias.js"></script>
  <script>
  const { getSesiones, saveSesiones, cambiarEstadoSesion } = TutoriasDB;
  const { estadoBadge, formatFecha, tutoriasToast } = TutoriasUI;

  let tabActual = 'proximas';

  function setTab(tab, el) {
    tabActual = tab;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    render();
  }

  function render() {
    const todas = getSesiones();
    const hoy = new Date().toISOString().split('T')[0];
    let lista;
    if (tabActual === 'proximas')  lista = todas.filter(s => s.estado==='aceptada' && s.fecha >= hoy);
    if (tabActual === 'pendientes') lista = todas.filter(s => s.estado==='pendiente');
    if (tabActual === 'pasadas')    lista = todas.filter(s => s.estado==='completada' || s.estado==='cancelada' || s.estado==='rechazada' || (s.estado==='aceptada' && s.fecha < hoy));

    const cont = document.getElementById('sesiones-container');
    if (!lista || lista.length === 0) {
      const msgs = {
        proximas:  ['📅','Sin sesiones confirmadas','Cuando un tutor acepte tu solicitud aparecerá aquí'],
        pendientes:['⏳','Sin solicitudes pendientes','Busca un tutor y envía tu primera solicitud'],
        pasadas:   ['📚','Sin historial aún','Tus sesiones completadas aparecerán aquí']
      };
      const [ico, tit, sub] = msgs[tabActual];
      cont.innerHTML = '<div class="empty-sesiones"><div style="font-size:48px;margin-bottom:12px;">'+ico+'</div><div style="font-family:Syne,sans-serif;font-size:18px;font-weight:800;color:#1A1A2E;margin-bottom:6px;">'+tit+'</div><div style="font-size:13px;color:#6B6B80;">'+sub+'</div></div>';
      return;
    }

    cont.innerHTML = [...lista].reverse().map(s => {
      // ── WhatsApp button: ONLY shown when estado === 'aceptada' AND s.whatsapp exists ──
      const waSection = (s.estado === 'aceptada' && s.whatsapp)
        ? `<div style="margin-top:14px;padding-top:14px;border-top:1px solid #F0EDE8;">
            <p style="font-size:12px;color:#16A34A;font-weight:600;margin-bottom:8px;">
              ✅ Sesión confirmada — coordina los detalles con tu tutor:
            </p>
            <a href="https://wa.me/52${s.whatsapp}?text=${encodeURIComponent('Hola '+s.tutorNombre+'! Reservé una sesión de '+s.materia+' para el '+s.fecha+' a las '+s.hora+' a través de UThub.')}"
               target="_blank" class="btn-whatsapp">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
              Abrir WhatsApp con ${s.tutorNombre}
            </a>
           </div>`
        : '';

      const cancelBtn = (s.estado === 'pendiente' || s.estado === 'aceptada')
        ? '<button class="btn-cancelar" onclick="cancelar('+s.id+')">Cancelar solicitud</button>'
        : '';

      return '<div class="sesion-card estado-'+s.estado+'">'
        +'<div class="sesion-header">'
          +'<div class="sesion-tutor">'
            +'<div class="sesion-avatar" style="background:'+s.tutorColor+'">'+s.tutorAvatar+'</div>'
            +'<div><div class="sesion-nombre">'+s.tutorNombre+'</div>'
            +'<div class="sesion-materia">'+s.materia+'</div></div>'
          +'</div>'
          +estadoBadge(s.estado)
        +'</div>'
        +'<div class="sesion-info">'
          +'<div class="sesion-dato">📅 <strong>'+s.fecha+'</strong></div>'
          +'<div class="sesion-dato">🕐 <strong>'+s.hora+'</strong></div>'
          +'<div class="sesion-dato">💰 <strong>$'+s.precio+'/hr</strong></div>'
        +'</div>'
        +(s.notas ? '<div style="font-size:12px;color:#6B6B80;margin-bottom:10px;">📝 '+s.notas+'</div>' : '')
        +waSection
        +(cancelBtn ? '<div style="margin-top:12px;">'+cancelBtn+'</div>' : '')
        +'</div>';
    }).join('');
  }

  function cancelar(id) {
    if (!confirm('¿Cancelar esta solicitud?')) return;
    cambiarEstadoSesion(id, 'cancelada');
    tutoriasToast('Solicitud cancelada', 'info');
    render();
  }

  document.addEventListener('DOMContentLoaded', render);
  </script>
</body>
</html>
