<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perfil Tutor - UThub</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../css/styles.css">
  <link rel="stylesheet" href="../../css/dashboard.css">
  <link rel="stylesheet" href="../../css/comida.css">
  <style>
    .tutor-profile-layout{display:grid;grid-template-columns:1fr 340px;gap:28px;align-items:start;}
    @media(max-width:900px){.tutor-profile-layout{grid-template-columns:1fr;}}
    .profile-card{background:white;border-radius:20px;padding:32px;box-shadow:0 4px 20px rgba(0,0,0,.06);}
    .profile-top{display:flex;align-items:center;gap:20px;margin-bottom:24px;padding-bottom:24px;border-bottom:1px solid #F0EDE8;}
    .profile-avatar{width:80px;height:80px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:Syne,sans-serif;font-size:26px;font-weight:800;color:white;flex-shrink:0;overflow:hidden;}
    .profile-avatar img{width:100%;height:100%;object-fit:cover;}
    .profile-name{font-family:Syne,sans-serif;font-size:24px;font-weight:800;color:#1A1A2E;margin-bottom:4px;}
    .profile-carrera{font-size:14px;color:#6B6B80;margin-bottom:8px;}
    .profile-stats{display:flex;gap:20px;}
    .stat-item{text-align:center;}
    .stat-val{font-family:Syne,sans-serif;font-size:20px;font-weight:800;color:#1A1A2E;}
    .stat-lbl{font-size:11px;color:#6B6B80;text-transform:uppercase;letter-spacing:.06em;}
    .section-title{font-family:Syne,sans-serif;font-size:16px;font-weight:800;color:#1A1A2E;margin:0 0 12px;}
    .materias-list{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px;}
    .materia-tag{background:#FFF0E0;color:#D96A08;padding:6px 14px;border-radius:100px;font-size:13px;font-weight:600;}
    .horario-dias{display:flex;gap:6px;margin-bottom:8px;}
    .dia-pill{padding:4px 10px;border-radius:8px;font-size:11px;font-weight:700;}
    .dia-on{background:#F5841F;color:white;}
    .dia-off{background:#F3F4F6;color:#C4C4C4;}
    /* Booking card */
    .booking-card{background:white;border-radius:20px;padding:28px;box-shadow:0 4px 20px rgba(0,0,0,.06);position:sticky;top:88px;}
    .booking-price{font-family:Syne,sans-serif;font-size:32px;font-weight:800;color:#F5841F;margin-bottom:4px;}
    .booking-price span{font-size:14px;font-weight:400;color:#6B6B80;}
    .booking-form{display:flex;flex-direction:column;gap:14px;margin-top:20px;}
    .form-group{display:flex;flex-direction:column;gap:5px;}
    .form-label{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#6B6B80;}
    .form-control{padding:11px 14px;border:1.5px solid #E8E4DE;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:13px;color:#1A1A2E;background:white;outline:none;transition:border-color .2s;}
    .form-control:focus{border-color:#F5841F;}
    .btn-reservar{display:block;width:100%;padding:14px;background:#F5841F;color:white;border:none;border-radius:12px;font-family:Syne,sans-serif;font-size:15px;font-weight:700;cursor:pointer;text-align:center;transition:all .2s;margin-top:6px;}
    .btn-reservar:hover{background:#D96A08;transform:translateY(-1px);}
    .btn-reservar:disabled{background:#E5E7EB;color:#9CA3AF;cursor:not-allowed;transform:none;}
    .cupo-lleno{background:#FEF2F2;border:1px solid #FEE2E2;border-radius:12px;padding:14px;text-align:center;color:#EF4444;font-size:13px;font-weight:600;margin-top:14px;}
  </style>
</head>
<body class="dashboard-page">
  <header class="header" id="header">
    <div class="header-container">
      <a href="../../index.html" class="logo"><span class="logo-ut">UT</span><span class="logo-hub">hub</span></a>
      <nav class="nav">
        <ul class="nav-list">
          <li><a href="../auth/dashboard.html" class="nav-link">Dashboard</a></li>
          <li><a href="../comida/tiendas.html" class="nav-link">🍔 Comida</a></li>
          <li><a href="buscar.html" class="nav-link active">📚 Tutorías</a></li>
          <li><a href="../libros/catalogo.html" class="nav-link">📖 Libros</a></li>
        </ul>
      </nav>
      <div class="header-actions">
        <button class="icon-btn" id="notifications-btn">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          <span class="badge-notif">0</span>
        </button>
        <div class="user-menu"><button class="user-btn" id="user-menu-btn">
          <div class="user-avatar"><span id="user-initials">SM</span></div>
          <div class="user-info"><div class="user-name">Samantha Mata</div><div class="user-role">Estudiante</div></div>
        </button></div>
      </div>
    </div>
  </header>
  <nav aria-label="breadcrumb" class="breadcrumb-nav">
    <div class="container">
      <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="buscar.html">Tutorías</a></li>
        <li class="breadcrumb-item active" id="bc-nombre" aria-current="page">Tutor</li>
      </ol>
    </div>
  </nav>
  <main class="main-content">
    <div class="container">
      <div class="tutor-profile-layout" id="profile-root">
        <div style="text-align:center;padding:60px;color:#6B6B80;">Cargando perfil...</div>
      </div>
    </div>
  </main>
  <script src="/js/config.js"></script>
  <script src="../../js/tutorias.js"></script>
  <script>
  const { getTutores, crearReserva } = TutoriasDB;
  const { renderStars, modalidadLabel, horarioTexto, tutoriasToast } = TutoriasUI;
  const DIAS = ['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];

  document.addEventListener('DOMContentLoaded', () => {
    const id = parseInt(new URLSearchParams(location.search).get('id'));
    const tutor = getTutores().find(t => t.id === id);
    const root = document.getElementById('profile-root');
    if (!tutor) {
      root.innerHTML = '<div style="text-align:center;padding:80px;"><div style="font-size:48px">📚</div><h2 style="font-family:Syne,sans-serif;font-size:20px;font-weight:800;margin:12px 0 8px;">Tutor no encontrado</h2><a href="buscar.html" style="color:#F5841F;">← Volver al catálogo</a></div>';
      return;
    }
    document.title = tutor.nombre + ' - UThub';
    document.getElementById('bc-nombre').textContent = tutor.nombre;

    const diasHtml = DIAS.map((d,i) =>
      '<span class="dia-pill ' + (tutor.horario?.dias?.[i] ? 'dia-on' : 'dia-off') + '">' + d + '</span>'
    ).join('');
    const materiasHtml = tutor.materias.map(m => '<span class="materia-tag">'+m+'</span>').join('');
    const fotoHtml = tutor.foto
      ? '<img src="'+tutor.foto+'" alt="'+tutor.nombre+'" loading="lazy">'
      : tutor.avatar;

    const bookingSection = tutor.disponible ? `
      <div class="booking-form">
        <div class="form-group">
          <label class="form-label">Materia a estudiar</label>
          <select class="form-control" id="book-materia">
            <option value="">Selecciona una materia</option>
            ${tutor.materias.map(m => '<option value="'+m+'">'+m+'</option>').join('')}
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Fecha preferida</label>
          <input type="date" class="form-control" id="book-fecha" min="${new Date().toISOString().split('T')[0]}">
        </div>
        <div class="form-group">
          <label class="form-label">Hora preferida</label>
          <select class="form-control" id="book-hora">
            <option value="">Selecciona hora</option>
            <option>07:00</option><option>08:00</option><option>09:00</option>
            <option>10:00</option><option>11:00</option><option>13:00</option>
            <option>14:00</option><option>15:00</option><option>16:00</option>
            <option>17:00</option><option>18:00</option><option>19:00</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Notas adicionales (opcional)</label>
          <textarea class="form-control" id="book-notas" rows="2" placeholder="Tema específico, dudas, etc."></textarea>
        </div>
        <button class="btn-reservar" onclick="reservar(${tutor.id})">Solicitar Sesión →</button>
        <p style="font-size:11px;color:#9CA3AF;text-align:center;margin-top:6px;">
          El tutor confirmará tu solicitud. Al aceptar, recibirás su contacto de WhatsApp.
        </p>
      </div>` :
      '<div class="cupo-lleno">🔴 Este tutor no tiene disponibilidad por el momento.<br><a href="buscar.html" style="color:#F5841F;font-size:12px;margin-top:6px;display:inline-block;">Ver otros tutores</a></div>';

    root.innerHTML = `
      <div>
        <div class="profile-card">
          <div class="profile-top">
            <div class="profile-avatar" style="background:${tutor.color}">${fotoHtml}</div>
            <div style="flex:1">
              <div class="profile-name">${tutor.nombre}</div>
              <div class="profile-carrera">${tutor.carrera} · ${tutor.semestre} semestre</div>
              <div style="display:flex;align-items:center;gap:6px;margin-top:4px;">
                <span style="color:#F5841F;font-size:15px;">${renderStars(tutor.calificacion)}</span>
                <span style="font-weight:700;font-size:14px;">${tutor.calificacion}</span>
                <span style="color:#6B6B80;font-size:13px;">(${tutor.sesiones} sesiones)</span>
              </div>
            </div>
            <div class="profile-stats">
              <div class="stat-item"><div class="stat-val">$${tutor.precio}</div><div class="stat-lbl">Por hora</div></div>
              <div class="stat-item"><div class="stat-val">${tutor.sesiones}</div><div class="stat-lbl">Sesiones</div></div>
            </div>
          </div>
          <h3 class="section-title">Sobre mí</h3>
          <p style="font-size:14px;color:#6B6B80;line-height:1.7;margin-bottom:20px;">${tutor.descripcion}</p>
          <h3 class="section-title">Materias que enseño</h3>
          <div class="materias-list">${materiasHtml}</div>
          <h3 class="section-title">Disponibilidad</h3>
          <div class="horario-dias">${diasHtml}</div>
          <p style="font-size:13px;color:#6B6B80;margin-bottom:20px;">${horarioTexto(tutor.horario)}</p>
          <div style="display:flex;gap:16px;flex-wrap:wrap;">
            <div style="font-size:13px;color:#6B6B80;">📍 ${tutor.ubicacion}</div>
            <div style="font-size:13px;color:#6B6B80;">${modalidadLabel(tutor.modalidad)}</div>
            <div style="font-size:13px;color:#6B6B80;">🌐 ${tutor.idioma}</div>
          </div>
        </div>
      </div>
      <div>
        <div class="booking-card">
          <div class="booking-price">$${tutor.precio}<span>/hora</span></div>
          <div style="font-size:13px;color:#6B6B80;">Sesión de 1 hora · Coordinas por WhatsApp al confirmar</div>
          ${bookingSection}
        </div>
      </div>`;
  });

  function reservar(tutorId) {
    const materia = document.getElementById('book-materia').value;
    const fecha   = document.getElementById('book-fecha').value;
    const hora    = document.getElementById('book-hora').value;
    const notas   = document.getElementById('book-notas').value;
    if (!materia) { tutoriasToast('Selecciona una materia', 'error'); return; }
    if (!fecha)   { tutoriasToast('Selecciona una fecha', 'error'); return; }
    if (!hora)    { tutoriasToast('Selecciona una hora', 'error'); return; }
    crearReserva(tutorId, fecha, hora, materia, notas);
    tutoriasToast('¡Solicitud enviada! El tutor confirmará pronto.', 'success');
    setTimeout(() => location.href = 'mis-sesiones.html', 1800);
  }
  </script>
</body>
</html>
