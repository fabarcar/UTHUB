<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detalle de Libro - UThub</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../css/styles.css">
  <link rel="stylesheet" href="../../css/dashboard.css">
  <link rel="stylesheet" href="../../css/libros.css">
</head>
<body class="dashboard-page">

  <header class="header" id="header">
    <div class="header-container">
      <a href="../../index.html" class="logo"><span class="logo-ut">UT</span><span class="logo-hub">hub</span></a>
      <nav class="nav">
        <ul class="nav-list">
          <li><a href="../auth/dashboard.html" class="nav-link">Dashboard</a></li>
          <li><a href="../comida/tiendas.html" class="nav-link">🍔 Comida</a></li>
          <li><a href="../tutorias/buscar.html" class="nav-link">📚 Tutorías</a></li>
          <li><a href="catalogo.html" class="nav-link active">📖 Libros</a></li>
          <li><a href="../servicios/explorar.html" class="nav-link">💼 Servicios</a></li>
        </ul>
      </nav>
      <div class="header-actions">
        <div class="user-menu">
          <button class="user-btn"><div class="user-avatar"><span id="user-initials"></span></div>
            <div class="user-info"><div class="user-name" id="user-name"></div><div class="user-role">Estudiante</div></div>
          </button>
        </div>
      </div>
    </div>
  </header>

  <nav aria-label="breadcrumb" class="breadcrumb-nav">
    <div class="container">
      <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="catalogo.html">Libros</a></li>
        <li class="breadcrumb-item active" id="bc-titulo" aria-current="page">Detalle</li>
      </ol>
    </div>
  </nav>

  <main class="main-content">
    <div class="container">
      <div id="libro-root">
        <div style="text-align:center;padding:80px;color:#6B6B80;">Cargando libro...</div>
      </div>
    </div>
  </main>
  <script src="/js/config.js"></script>
  <script src="../../js/protect.js"></script>
  <script src="../../js/validation.js"></script>
  <script src="../../js/auth.js"></script>
  <script src="../../js/main.js"></script>
  <script src="../../js/libros.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const id = parseInt(new URLSearchParams(location.search).get('id'));
      const libro = LibrosDB.getLibroById(id);
      const root = document.getElementById('libro-root');

      if (!libro) {
        root.innerHTML = `<div style="text-align:center;padding:80px;"><div style="font-size:48px">📚</div><h2 style="font-family:Syne,sans-serif;font-size:20px;font-weight:800;margin:12px 0 8px;">Libro no encontrado</h2><a href="catalogo.html" style="color:#F5841F;">← Volver al catálogo</a></div>`;
        return;
      }

      document.title = libro.titulo + ' - UThub';
      document.getElementById('bc-titulo').textContent = libro.titulo;

      const desc = LibrosUI.descuento(libro.precio, libro.precioNuevo);
      const estadoLabel = LibrosUI.estadoLabel(libro.estado);
      const waMsg = encodeURIComponent(`Hola ${libro.vendedor.nombre.split(' ')[0]}, vi tu libro *"${libro.titulo}"* en UThub y me interesa comprarlo. ¿Sigue disponible?`);

      root.innerHTML = `
        <div class="libro-detail-layout">
          <!-- Columna izquierda -->
          <div>
            <div class="libro-info-card">
              <div class="libro-cover-large" style="background:linear-gradient(135deg,${libro.color},${libro.color}BB);">
                <span style="position:relative;z-index:1">${libro.emoji}</span>
                <span class="libro-estado-badge estado-${libro.estado}" style="position:absolute;top:16px;right:16px;z-index:2;">${estadoLabel}</span>
              </div>
              <h1 style="font-family:'Syne',sans-serif;font-size:24px;font-weight:800;color:#1A1A2E;margin-bottom:6px;">${libro.titulo}</h1>
              <p style="font-size:15px;color:#6B6B80;margin-bottom:16px;">${libro.autor}</p>
              <div style="background:#F7F4F0;border-radius:12px;padding:16px;margin-bottom:20px;">
                <p style="font-size:14px;color:#1A1A2E;line-height:1.7;">${libro.descripcion}</p>
              </div>
              <h3 style="font-family:'Syne',sans-serif;font-size:15px;font-weight:800;margin-bottom:12px;">Detalles del libro</h3>
              <table class="libro-info-table">
                <tr><td>Edición</td><td>${libro.edicion}</td></tr>
                <tr><td>ISBN</td><td><code style="font-size:12px;">${libro.isbn}</code></td></tr>
                <tr><td>Carrera</td><td>${libro.carrera}</td></tr>
                <tr><td>Semestre</td><td>${libro.semestre}</td></tr>
                <tr><td>Estado</td><td><span class="libro-estado-badge estado-${libro.estado}" style="position:static;">${estadoLabel}</span></td></tr>
                <tr><td>Publicado</td><td>${libro.fecha}</td></tr>
                <tr><td>Vistas</td><td>${libro.vistas} personas lo han visto</td></tr>
              </table>
            </div>

            <!-- Vendedor -->
            <div class="libro-info-card">
              <h3 style="font-family:'Syne',sans-serif;font-size:15px;font-weight:800;margin-bottom:16px;">Sobre el vendedor</h3>
              <div style="display:flex;align-items:center;gap:14px;">
                <div style="width:52px;height:52px;border-radius:50%;background:${libro.vendedor.color};display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:white;">${libro.vendedor.iniciales}</div>
                <div>
                  <div style="font-family:'Syne',sans-serif;font-size:16px;font-weight:800;color:#1A1A2E;">${libro.vendedor.nombre}</div>
                  <div style="font-size:13px;color:#6B6B80;">Estudiante UTSC</div>
                </div>
              </div>
            </div>
          </div>

          <!-- Sidebar compra -->
          <div>
            <div class="comprar-card">
              <div style="display:flex;align-items:baseline;gap:10px;margin-bottom:6px;">
                <span style="font-family:'Syne',sans-serif;font-size:36px;font-weight:800;color:#F5841F;">$${libro.precio}</span>
                <span style="font-size:16px;color:#9CA3AF;text-decoration:line-through;">$${libro.precioNuevo}</span>
              </div>
              <div style="display:inline-flex;align-items:center;gap:6px;background:#DCFCE7;color:#16A34A;padding:5px 12px;border-radius:100px;font-size:12px;font-weight:700;margin-bottom:20px;">
                🎉 Ahorras $${libro.precioNuevo - libro.precio} (${desc}% de descuento)
              </div>

              <a href="https://wa.me/52${libro.vendedor.whatsapp || '8112345678'}?text=${waMsg}" target="_blank" class="btn-contactar">
                📱 Contactar por WhatsApp
              </a>
              <button onclick="LibrosUI.librosToast('¡Guardado en favoritos!','success')" style="display:block;width:100%;padding:12px;background:#F7F4F0;color:#1A1A2E;border:none;border-radius:12px;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;cursor:pointer;margin-bottom:16px;transition:all .2s;" onmouseover="this.style.background='#EDE8E0'" onmouseout="this.style.background='#F7F4F0'">
                ♡ Guardar en favoritos
              </button>

              <div style="border-top:1px solid #F0EDE8;padding-top:16px;">
                <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;font-size:13px;color:#6B6B80;">
                  <span>✅</span> Contacto seguro dentro del campus
                </div>
                <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;font-size:13px;color:#6B6B80;">
                  <span>🏫</span> Entrega en UTSC, Santa Catarina
                </div>
                <div style="display:flex;align-items:center;gap:8px;font-size:13px;color:#6B6B80;">
                  <span>🤝</span> Trato directo entre estudiantes
                </div>
              </div>
            </div>

            <!-- Más libros del mismo vendedor -->
            <div style="background:white;border-radius:16px;padding:20px;margin-top:16px;box-shadow:0 2px 12px rgba(0,0,0,.06);">
              <p style="font-family:'Syne',sans-serif;font-size:13px;font-weight:800;margin-bottom:12px;">Más de ${libro.vendedor.nombre.split(' ')[0]}</p>
              <p style="font-size:12px;color:#6B6B80;">Contacta al vendedor para ver si tiene más libros disponibles.</p>
              <a href="catalogo.html" style="display:inline-block;margin-top:10px;font-size:13px;color:#F5841F;font-weight:600;">Ver catálogo completo →</a>
            </div>
          </div>
        </div>`;
    });
  </script>
</body>
</html>
