<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Perfil Freelance - UThub</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../css/styles.css">
  <link rel="stylesheet" href="../../css/dashboard.css">
  <link rel="stylesheet" href="../../css/servicios.css">
</head>
<body class="dashboard-page">

  <header class="header" id="header">
    <div class="header-container">
      <a href="../../index.html" class="logo"><span class="logo-ut">UT</span><span class="logo-hub">hub</span></a>
      <nav class="nav">
        <ul class="nav-list">
          <li><a href="../auth/dashboard.html" class="nav-link">Dashboard</a></li>
          <li><a href="../comida/tiendas.html" class="nav-link">🍔 Comida</a></li>
          <li><a href="../tutorias/buscar.html" class="nav-link">📚 Tutorías</a></li>
          <li><a href="../libros/catalogo.html" class="nav-link">📖 Libros</a></li>
          <li><a href="explorar.html" class="nav-link active">💼 Servicios</a></li>
        </ul>
      </nav>
      <div class="header-actions">
        <div class="user-menu">
          <button class="user-btn"><div class="user-avatar"><span></span></div>
            <div class="user-info"><div class="user-name" id="user-name"></div><div class="user-role">Estudiante</div></div>
          </button>
        </div>
      </div>
    </div>
  </header>

  <nav aria-label="breadcrumb" class="breadcrumb-nav">
    <div class="container">
      <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="explorar.html">Servicios</a></li>
        <li class="breadcrumb-item active" aria-current="page">Mi perfil freelance</li>
      </ol>
    </div>
  </nav>

  <main class="main-content">
    <div class="container">
      <div class="perfil-layout">

        <!-- Sidebar -->
        <div>
          <div class="perfil-card-aside">
            <div class="perfil-avatar-lg" style="background:linear-gradient(135deg,#F5841F,#D96A08);">SM</div>
            <h2 style="font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:#1A1A2E;margin-bottom:4px;">Samantha Mata</h2>
            <p style="font-size:13px;color:#6B6B80;margin-bottom:4px;">Ing. en Sistemas · 8vo semestre</p>
            <p style="font-size:12px;color:#F5841F;font-weight:600;margin-bottom:16px;">Freelancer UTSC</p>

            <div class="perfil-stats-grid">
              <div class="pstat">
                <div class="pstat-val" id="p-servicios">0</div>
                <div class="pstat-lbl">Servicios</div>
              </div>
              <div class="pstat">
                <div class="pstat-val" id="p-trabajos">0</div>
                <div class="pstat-lbl">Trabajos</div>
              </div>
              <div class="pstat">
                <div class="pstat-val" id="p-rating">—</div>
                <div class="pstat-lbl">Rating</div>
              </div>
            </div>

            <a href="publicar.html" style="display:block;padding:12px;background:#F5841F;color:white;border-radius:12px;text-decoration:none;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;text-align:center;transition:all .2s;margin-bottom:10px;" onmouseover="this.style.background='#D96A08'" onmouseout="this.style.background='#F5841F'">
              + Nuevo servicio
            </a>
            <a href="explorar.html" style="display:block;padding:12px;background:#F7F4F0;color:#1A1A2E;border-radius:12px;text-decoration:none;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;text-align:center;transition:all .2s;" onmouseover="this.style.background='#EDE8E0'" onmouseout="this.style.background='#F7F4F0'">
              Ver catálogo
            </a>
          </div>
        </div>

        <!-- Contenido principal -->
        <div>
          <!-- Header -->
          <div style="display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:24px;flex-wrap:wrap;">
            <h1 style="font-family:'Syne',sans-serif;font-size:24px;font-weight:800;color:#1A1A2E;">Mis servicios publicados</h1>
          </div>

          <!-- Lista de servicios -->
          <div id="mis-servicios-list">
            <!-- Renderizado por JS -->
          </div>
        </div>
      </div>
    </div>
  </main>
  <script src="/js/config.js"></script>
  <script src="../../js/protect.js"></script>
  <script src="../../js/validation.js"></script>
  <script src="../../js/auth.js"></script>
  <script src="../../js/main.js"></script>
  <script src="../../js/servicios.js"></script>
  <script>
    function renderMisServicios() {
      const servicios = ServiciosDB.getMisServicios();
      const list = document.getElementById('mis-servicios-list');

      // Actualizar stats
      document.getElementById('p-servicios').textContent = servicios.length;
      document.getElementById('p-trabajos').textContent = servicios.reduce((s, sv) => s + sv.trabajos, 0);
      const califs = servicios.filter(s => s.calificacion > 0);
      document.getElementById('p-rating').textContent = califs.length > 0
        ? (califs.reduce((s, sv) => s + sv.calificacion, 0) / califs.length).toFixed(1)
        : '—';

      if (servicios.length === 0) {
        list.innerHTML = `
          <div style="text-align:center;padding:60px;background:white;border-radius:20px;border:2px dashed #E8E4DE;">
            <div style="font-size:48px;margin-bottom:16px;">💼</div>
            <h3 style="font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:#1A1A2E;margin-bottom:8px;">Aún no has publicado servicios</h3>
            <p style="color:#6B6B80;margin-bottom:20px;">Comparte tu talento con la comunidad UTSC y empieza a generar ingresos</p>
            <a href="publicar.html" style="display:inline-flex;align-items:center;gap:8px;padding:12px 24px;background:#F5841F;color:white;border-radius:12px;text-decoration:none;font-family:'Syne',sans-serif;font-weight:700;">
              + Publicar mi primer servicio
            </a>
          </div>`;
        return;
      }

      list.innerHTML = servicios.map(s => `
        <div class="mi-libro-row" style="margin-bottom:14px;" id="row-${s.id}">
          <div class="mi-libro-icon" style="background:${s.color || '#FFF0E0'};">
            <span style="font-size:28px;">${s.emoji || '💼'}</span>
          </div>
          <div class="mi-libro-info">
            <div class="mi-libro-titulo">${s.titulo}</div>
            <div class="mi-libro-meta">
              <span>${s.categoria}</span>
              <span>·</span>
              <span style="color:#F5841F;font-weight:700;">$${s.precio} estándar</span>
              <span>·</span>
              <span>Entrega: ${s.entrega}</span>
              <span class="status-pill status-activo">● Activo</span>
            </div>
          </div>
          <div class="mi-libro-acciones">
            <button class="btn-accion-sm btn-edit" onclick="window.location.href='servicio.html?id=${s.id}'">Ver</button>
            <button class="btn-accion-sm btn-del" onclick="eliminarServicio(${s.id})">Eliminar</button>
          </div>
        </div>`).join('');
    }

    function eliminarServicio(id) {
      if (!confirm('¿Eliminar este servicio?')) return;
      ServiciosDB.eliminarServicio(id);
      ServiciosUI.serviciosToast('Servicio eliminado', 'success');
      renderMisServicios();
    }

    document.addEventListener('DOMContentLoaded', renderMisServicios);
  </script>
</body>
</html>
