<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mis Libros - UThub</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../css/styles.css">
  <link rel="stylesheet" href="../../css/dashboard.css">
  <link rel="stylesheet" href="../../css/libros.css">
</head>
<body class="dashboard-page">

  <header class="header" id="header">
    <div class="header-container">
      <a href="../../index.html" class="logo"><span class="logo-ut">UT</span><span class="logo-hub">hub</span></a>
      <nav class="nav">
        <ul class="nav-list">
          <li><a href="../auth/dashboard.html" class="nav-link">Dashboard</a></li>
          <li><a href="../comida/tiendas.html" class="nav-link">🍔 Comida</a></li>
          <li><a href="../tutorias/buscar.html" class="nav-link">📚 Tutorías</a></li>
          <li><a href="catalogo.html" class="nav-link active">📖 Libros</a></li>
          <li><a href="../servicios/explorar.html" class="nav-link">💼 Servicios</a></li>
        </ul>
      </nav>
      <div class="header-actions">
        <div class="user-menu">
          <button class="user-btn"><div class="user-avatar"><span id="user-initials"></span></div>
            <div class="user-info"><div class="user-name" id="user-name"></div><div class="user-role">Estudiante</div></div>
          </button>
        </div>
      </div>
    </div>
  </header>

  <nav aria-label="breadcrumb" class="breadcrumb-nav">
    <div class="container">
      <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="catalogo.html">Libros</a></li>
        <li class="breadcrumb-item active" aria-current="page">Mis publicaciones</li>
      </ol>
    </div>
  </nav>

  <main class="main-content">
    <div class="container">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:20px;margin-bottom:28px;flex-wrap:wrap;">
        <div>
          <h1 style="font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:#1A1A2E;margin-bottom:6px;">📚 Mis libros publicados</h1>
          <p style="font-size:15px;color:#6B6B80;">Administra tus publicaciones activas</p>
        </div>
        <a href="vender.html" style="display:inline-flex;align-items:center;gap:8px;padding:12px 22px;background:#F5841F;color:white;border-radius:12px;text-decoration:none;font-family:'Syne',sans-serif;font-weight:700;font-size:14px;transition:all .2s;" onmouseover="this.style.background='#D96A08'" onmouseout="this.style.background='#F5841F'">
          + Publicar nuevo
        </a>
      </div>

      <!-- Stats -->
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:28px;" id="stats-row">
        <div style="background:white;border-radius:16px;padding:20px;box-shadow:0 2px 12px rgba(0,0,0,.06);text-align:center;">
          <div style="font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:#1A1A2E;" id="stat-total">0</div>
          <div style="font-size:12px;color:#6B6B80;margin-top:4px;">Publicaciones</div>
        </div>
        <div style="background:white;border-radius:16px;padding:20px;box-shadow:0 2px 12px rgba(0,0,0,.06);text-align:center;">
          <div style="font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:#22C55E;" id="stat-activos">0</div>
          <div style="font-size:12px;color:#6B6B80;margin-top:4px;">Activos</div>
        </div>
        <div style="background:white;border-radius:16px;padding:20px;box-shadow:0 2px 12px rgba(0,0,0,.06);text-align:center;">
          <div style="font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:#F5841F;" id="stat-valor">$0</div>
          <div style="font-size:12px;color:#6B6B80;margin-top:4px;">Valor total</div>
        </div>
      </div>

      <div class="mis-libros-list" id="mis-libros-list">
        <!-- Renderizado por JS -->
      </div>
    </div>
  </main>
  <script src="/js/config.js"></script>
  <script src="../../js/protect.js"></script>
  <script src="../../js/validation.js"></script>
  <script src="../../js/auth.js"></script>
  <script src="../../js/main.js"></script>
  <script src="../../js/libros.js"></script>
  <script>
    function renderMisLibros() {
      const libros = LibrosDB.getMisLibros();
      const list = document.getElementById('mis-libros-list');

      document.getElementById('stat-total').textContent = libros.length;
      document.getElementById('stat-activos').textContent = libros.filter(l => l.activo).length;
      document.getElementById('stat-valor').textContent = '$' + libros.reduce((s, l) => s + l.precio, 0);

      if (libros.length === 0) {
        list.innerHTML = `
          <div style="text-align:center;padding:60px;background:white;border-radius:20px;border:2px dashed #E8E4DE;">
            <div style="font-size:48px;margin-bottom:16px;">📚</div>
            <h3 style="font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:#1A1A2E;margin-bottom:8px;">Aún no has publicado libros</h3>
            <p style="color:#6B6B80;margin-bottom:20px;">Publica tu primer libro y empieza a ganar dinero</p>
            <a href="vender.html" style="display:inline-flex;align-items:center;gap:8px;padding:12px 24px;background:#F5841F;color:white;border-radius:12px;text-decoration:none;font-family:'Syne',sans-serif;font-weight:700;">
              + Publicar mi primer libro
            </a>
          </div>`;
        return;
      }

      const estadoLabel = { 'nuevo': 'Nuevo', 'muy-bueno': 'Muy bueno', 'bueno': 'Buen estado', 'regular': 'Regular' };
      list.innerHTML = libros.map(l => `
        <div class="mi-libro-row" id="row-${l.id}">
          <div class="mi-libro-icon" style="background:${l.color || '#FFF0E0'};">
            <span style="font-size:28px;">${l.emoji || '📖'}</span>
          </div>
          <div class="mi-libro-info">
            <div class="mi-libro-titulo">${l.titulo}</div>
            <div class="mi-libro-meta">
              <span>${l.autor}</span>
              <span>·</span>
              <span style="color:#F5841F;font-weight:700;">$${l.precio}</span>
              <span>·</span>
              <span>${estadoLabel[l.estado] || l.estado}</span>
              <span class="status-pill status-activo">● Activo</span>
            </div>
          </div>
          <div class="mi-libro-acciones">
            <button class="btn-accion-sm btn-edit" onclick="window.location.href='libro.html?id=${l.id}'">Ver</button>
            <button class="btn-accion-sm btn-del" onclick="eliminarLibro(${l.id})">Eliminar</button>
          </div>
        </div>`).join('');
    }

    function eliminarLibro(id) {
      if (!confirm('¿Eliminar esta publicación?')) return;
      LibrosDB.eliminarLibro(id);
      LibrosUI.librosToast('Libro eliminado', 'success');
      renderMisLibros();
    }

    document.addEventListener('DOMContentLoaded', renderMisLibros);
  </script>
</body>
</html>
